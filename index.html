<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Totoro's forest awakens</title>
	<meta name="description" content="A premium dark cinematic landing page for a Totoro-inspired magical forest terrarium." />
	<link rel="stylesheet" href="styles.css" />
</head>
<body>
	<main class="page-shell">
		<section class="story" id="story">
			<div class="hero" id="hero">
				<div class="media-stack" aria-hidden="true">
					<img
						class="hero-image base-image"
						src="%D0%92%D0%BE%D0%B7%D1%8C%D0%BC%D0%B8_%D0%BF%D0%B5%D1%80%D0%B2%D0%BE%D0%B5_%D1%84%D0%BE%D1%82%D0%BE_%D0%B8_%D0%B4%D0%BE%D0%B1%D0%B0%D0%B2%D1%8C_202606300020.jpeg"
						alt="Totoro-inspired magical terrarium"
					/>
					<div class="reveal-layer" id="revealLayer">
						<video
							class="hero-video reveal-video"
							id="revealVideo"
							autoplay
							muted
							loop
							playsinline
							preload="auto"
							poster="%D0%94%D0%BE%D0%B1%D0%B0%D0%B2%D1%8C_%D0%B2%D0%BD%D1%83%D1%82%D1%80%D1%8C_%D0%BF%D0%B5%D1%80%D0%B2%D0%BE%D0%B8%CC%86_%D0%B1%D0%B0%D0%BD%D0%BA%D0%B8_%D0%BE%D1%80%D0%B0%D0%BD%D0%B6%D0%B5%D0%B2%D0%BE%D0%B3%D0%BE_202606300000.jpeg"
						>
							<source src="bez.mp4" type="video/mp4" />
						</video>
						<div class="reveal-glow" id="revealGlow"></div>
					</div>
					<div class="vignette"></div>
				</div>

				<header class="navbar reveal-on-load">
					<div class="brand-mark">Totoro</div>
					<nav class="nav-pill" aria-label="Primary">
						<a href="#story">Forest</a>
						<a href="#story">Friends</a>
						<a href="#story">Story</a>
						<a href="#story">Moments</a>
						<a href="#story">Visit</a>
					</nav>
					<button class="glass-button nav-cta" type="button">Enter Forest</button>
					<button class="menu-toggle" type="button" aria-label="Open menu">
						<span></span><span></span>
					</button>
				</header>

				<div class="hero-copy">
					<h1 class="hero-title reveal-on-load">Totoro's forest awakens</h1>
				</div>

				<div class="hero-bottom">
					<div class="hero-note hero-note--left reveal-on-load" data-depth="0.75">
						<p>
							Step into a quiet woodland world where moss, rainlight, and gentle spirits turn every small path into a wonder.
						</p>
					</div>
					<div class="hero-note hero-note--right reveal-on-load" data-depth="1">
						<p>
							Move through the scene to reveal the hidden green magic around Totoro and his forest friends.
						</p>
						<button class="glass-button hero-cta" type="button">Meet Totoro</button>
					</div>
				</div>
			</div>
		</section>
	</main>
	<script src="script.js"></script>
</body>
</html>
